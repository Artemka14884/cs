# render.yaml — конфигурация деплоя для Render.com
# Render автоматически найдёт этот файл в корне репозитория и создаст сервис.
# Документация: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: tactical-shooter-prototype
    env: node
    plan: free          # можно сменить на starter/standard для лучшего пинга и аптайма
    region: frankfurt    # выберите ближайший к вашим друзьям регион (frankfurt/oregon/singapore/ohio)
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.20.0
    # PORT Render подставляет автоматически в process.env.PORT — ничего указывать не нужно
    healthCheckPath: /health
